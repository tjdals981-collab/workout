<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동">
<title>운동 루틴</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d26;--s2:#22263a;--line:#2a2e40;
  --text:#e8eaf0;--muted:#7c8099;--muted2:#4a4f66;
  --push:#7f77dd;--push-s:rgba(127,119,221,.15);
  --pull:#1d9e75;--pull-s:rgba(29,158,117,.15);
  --legs:#d85a30;--legs-s:rgba(216,90,48,.15);
  --done:#1d9e75;--warn:#ef9f27;--r:14px;
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif}
body{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:calc(72px + var(--sb))}
.page{display:none}.page.active{display:block}
.bot-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:rgba(15,17,23,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line);padding:8px 12px calc(8px + var(--sb));display:flex;gap:6px}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border-radius:10px;border:none;background:none;
  color:var(--muted);font-size:10px;cursor:pointer;transition:all .15s}
.bnav i{font-size:20px}.bnav.active{color:var(--push)}
.hdr{padding:52px 20px 12px;display:flex;align-items:flex-end;justify-content:space-between}
.hdr h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.hdr h1 span{color:var(--push)}
.icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
  background:var(--surface);color:var(--muted);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.icon-btn.active-edit{background:var(--push-s);border-color:var(--push);color:var(--push)}
.day-tabs{display:flex;gap:8px;padding:0 20px;margin-bottom:8px}
.dtab{flex:1;padding:10px 4px;border-radius:var(--r);border:1.5px solid var(--line);
  background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;
  text-align:center;cursor:pointer;transition:all .15s}
.dtab .ds{font-size:10px;font-weight:400;margin-top:2px;opacity:.7}
.dtab.push.on{background:var(--push-s);border-color:var(--push);color:var(--push)}
.dtab.pull.on{background:var(--pull-s);border-color:var(--pull);color:var(--pull)}
.dtab.legs.on{background:var(--legs-s);border-color:var(--legs);color:var(--legs)}
.prog-wrap{padding:6px 20px 14px}
.prog-info{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-lbl,.prog-pct{font-size:12px;color:var(--muted)}
.prog-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.prog-fill.push{background:var(--push)}.prog-fill.pull{background:var(--pull)}.prog-fill.legs{background:var(--legs)}
.ex-list{padding:0 20px}
.ex-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.ex-card.push.on{border-color:var(--push)}.ex-card.pull.on{border-color:var(--pull)}.ex-card.legs.on{border-color:var(--legs)}
.ex-card.done-card{opacity:.5}
.ex-head{display:flex;align-items:center;gap:10px;padding:12px 14px}
.ex-idx{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  color:var(--muted);flex-shrink:0;transition:all .15s}
.push.on .ex-idx{background:var(--push);border-color:var(--push);color:#fff}
.pull.on .ex-idx{background:var(--pull);border-color:var(--pull);color:#fff}
.legs.on .ex-idx{background:var(--legs);border-color:var(--legs);color:#fff}
.done-card .ex-idx{background:var(--done);border-color:var(--done);color:#fff}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;line-height:1.3}
.done-card .ex-name{text-decoration:line-through;text-decoration-color:var(--muted)}
.ex-meta{font-size:11px;color:var(--muted);margin-top:2px}
.ex-chev{font-size:14px;color:var(--muted2);transition:transform .2s;flex-shrink:0}
.ex-card.on .ex-chev{transform:rotate(180deg)}
.del-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);
  background:rgba(226,75,74,.12);color:#f09595;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.muscle-row{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 10px}
.mtag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--s2);border:1px solid var(--line);color:var(--muted)}
.detail{border-top:1px solid var(--line);padding:12px 14px;background:var(--s2)}
.sets-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.set-btns{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.sbtn{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);
  color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;
  display:flex;align-items:center;justify-content:center}
.sbtn.dk.push{background:var(--push);border-color:var(--push);color:#fff}
.sbtn.dk.pull{background:var(--pull);border-color:var(--pull);color:#fff}
.sbtn.dk.legs{background:var(--legs);border-color:var(--legs);color:#fff}
.timer-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:10px}
.timer-n{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px}
.timer-n.push{color:var(--push)}.timer-n.pull{color:var(--pull)}.timer-n.legs{color:var(--legs)}
.tctrls{display:flex;gap:6px}
.tbtn{padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:var(--s2);color:var(--text);font-size:12px;cursor:pointer}
.tip-box{font-size:12px;color:var(--muted);background:var(--surface);
  border-left:3px solid var(--line);border-radius:0 8px 8px 0;padding:8px 11px;line-height:1.6}
.push.on .tip-box{border-left-color:var(--push)}.pull.on .tip-box{border-left-color:var(--pull)}.legs.on .tip-box{border-left-color:var(--legs)}
.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:8px;
  margin:4px 20px 10px;padding:12px;border-radius:var(--r);border:1.5px dashed var(--line);
  background:none;color:var(--muted);font-size:13px;cursor:pointer;width:calc(100% - 40px)}
.add-ex-form{margin:0 20px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.aef-title{font-size:14px;font-weight:600;margin-bottom:12px}
.aef-row{margin-bottom:10px}
.aef-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.aef-input{width:100%;background:var(--s2);border:1px solid var(--line);border-radius:8px;
  padding:9px 11px;color:var(--text);font-size:13px;outline:none}
.aef-input:focus{border-color:var(--push)}
.aef-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.aef-btns{display:flex;gap:8px;margin-top:12px}
.aef-cancel{flex:1;padding:10px;border-radius:9px;border:1px solid var(--line);background:var(--s2);color:var(--muted);font-size:13px;cursor:pointer}
.aef-save{flex:2;padding:10px;border-radius:9px;border:none;background:var(--push);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.cmp-banner{margin:0 20px 12px;background:rgba(29,158,117,.1);border:1px solid var(--done);
  border-radius:var(--r);padding:16px;text-align:center}
.cmp-banner p{font-size:15px;font-weight:700;color:var(--done);margin-bottom:4px}
.cmp-banner span{font-size:12px;color:var(--muted)}
.stamp-btn{margin-top:10px;padding:10px 20px;border-radius:10px;border:none;
  background:var(--done);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.stamp-btn.stamped{background:var(--muted2);color:var(--muted)}
.section{padding:0 20px;margin-bottom:24px}
.sec-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px}
.stat-val{font-size:24px;font-weight:800;margin-bottom:2px}
.stat-val.push{color:var(--push)}.stat-val.pull{color:var(--pull)}.stat-val.legs{color:var(--legs)}.stat-val.gold{color:var(--warn)}
.stat-lbl{font-size:12px;color:var(--muted)}
.hist-item{display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.hist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hist-dot.push{background:var(--push)}.hist-dot.pull{background:var(--pull)}.hist-dot.legs{background:var(--legs)}
.hist-info{flex:1}
.hist-day{font-size:14px;font-weight:600}
.hist-date{font-size:12px;color:var(--muted);margin-top:1px}
.hist-sets{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.empty-hist{text-align:center;padding:30px;color:var(--muted);font-size:13px}
/* 추천 */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 20px;margin-bottom:10px}
.fchip{padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:var(--surface);
  color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;flex-shrink:0}
.fchip.on{background:var(--push-s);border-color:var(--push);color:var(--push)}
.fchip.beg.on{background:var(--pull-s);border-color:var(--pull);color:var(--pull)}
.fchip.adv.on{background:var(--legs-s);border-color:var(--legs);color:var(--legs)}
.rec-group{padding:0 20px;margin-bottom:20px}
.rec-group-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.3px;text-transform:uppercase;margin-bottom:10px}
.rec-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:11px 13px;margin-bottom:8px}
.rec-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.diff-badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;flex-shrink:0;margin-top:1px}
.diff-badge.초보{background:var(--pull-s);color:var(--pull)}
.diff-badge.중수{background:var(--push-s);color:var(--push)}
.diff-badge.고수{background:var(--legs-s);color:var(--legs)}
.rec-info{flex:1;min-width:0}
.rec-name{font-size:13px;font-weight:600;margin-bottom:2px}
.rec-desc{font-size:11px;color:var(--muted);line-height:1.5}
.rec-add{padding:5px 10px;border-radius:7px;border:1px solid var(--line);background:var(--s2);
  color:var(--muted);font-size:11px;cursor:pointer;flex-shrink:0;align-self:flex-start}
.target-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.ttag{font-size:10px;padding:2px 6px;border-radius:6px;background:rgba(127,119,221,.1);
  border:1px solid rgba(127,119,221,.2);color:var(--push);font-weight:500}
/* 도장 */
.streak-card{margin:0 20px 20px;background:var(--surface);border:1px solid var(--line);
  border-radius:16px;padding:20px;text-align:center}
.streak-fire{font-size:40px;margin-bottom:6px}
.streak-num{font-size:48px;font-weight:900;color:var(--warn);letter-spacing:-2px;line-height:1}
.streak-lbl{font-size:13px;color:var(--muted);margin-top:4px}
.streak-msg{margin:14px 0 0;font-size:13px;color:var(--text);line-height:1.7;
  background:var(--s2);border-radius:10px;padding:12px;text-align:left}
.best-row{display:flex;justify-content:center;gap:20px;margin-top:14px}
.best-item{text-align:center}
.best-val{font-size:20px;font-weight:700;color:var(--push)}
.best-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.cal-wrap{margin:0 20px 20px}
.cal-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:10px;color:var(--muted);text-align:center;padding:3px 0}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--muted);background:var(--surface)}
.cal-day.today{border:1.5px solid var(--push);color:var(--push);font-weight:700}
.cal-day.stamp{font-weight:700;color:#fff}
.cal-day.push-day{background:var(--push)}.cal-day.pull-day{background:var(--pull)}.cal-day.legs-day{background:var(--legs)}
.cal-day.faded{opacity:.25}
.ach-item{display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;opacity:.35}
.ach-item.unlocked{opacity:1;border-color:var(--warn)}
.ach-icon{font-size:24px;flex-shrink:0}
.ach-name{font-size:13px;font-weight:600}
.ach-cond{font-size:11px;color:var(--muted);margin-top:2px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;z-index:100}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--sb));width:100%;max-width:480px;margin:0 auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-day-btn{display:block;width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);background:var(--s2);
  color:var(--text);font-size:14px;font-weight:600;cursor:pointer;text-align:left;margin-bottom:8px}
.modal-cancel{padding:12px;border-radius:12px;border:none;background:none;color:var(--muted);font-size:14px;cursor:pointer;width:100%}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:10px 18px;font-size:13px;color:var(--text);z-index:200;
  pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:88vw;text-align:center}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="p-routine" class="page active">
  <div class="hdr">
    <div><h1>루틴<span>.</span></h1><div style="font-size:13px;color:var(--muted);margin-top:3px" id="routineSubtitle"></div></div>
    <button class="icon-btn" id="editToggleBtn" onclick="toggleEdit()">✏️</button>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="prog-wrap">
    <div class="prog-info"><span class="prog-lbl" id="progLbl"></span><span class="prog-pct" id="progPct"></span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div id="cmpBanner"></div>
  <div class="ex-list" id="exList"></div>
  <div id="addExArea"></div>
</div>

<div id="p-history" class="page">
  <div class="hdr"><h1>기록<span>.</span></h1></div>
  <div class="section">
    <div class="sec-title">통계</div>
    <div class="stat-grid" id="statGrid"></div>
  </div>
  <div class="section">
    <div class="sec-title">운동 기록</div>
    <div id="histList"></div>
  </div>
</div>

<div id="p-recommend" class="page">
  <div class="hdr"><h1>추천<span>.</span></h1></div>
  <div class="filter-row" id="diffFilter"></div>
  <div class="filter-row" id="muscleFilter"></div>
  <div id="recList"></div>
</div>

<div id="p-stamp" class="page">
  <div class="hdr"><h1>도장<span>.</span></h1></div>
  <div class="streak-card" id="streakCard"></div>
  <div class="cal-wrap">
    <div class="cal-title" id="calTitle"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="section" style="padding:0 20px">
    <div class="sec-title">업적</div>
    <div id="achList" style="padding:0"></div>
  </div>
</div>

<div class="bot-nav">
  <button class="bnav active" onclick="switchPage('routine',this)"><i>🏋️</i>루틴</button>
  <button class="bnav" onclick="switchPage('history',this)"><i>📊</i>기록</button>
  <button class="bnav" onclick="switchPage('recommend',this)"><i>💡</i>추천</button>
  <button class="bnav" onclick="switchPage('stamp',this)"><i>🔥</i>도장</button>
</div>

<div class="modal-bg hidden" id="addModal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div id="modalBtns"></div>
    <button class="modal-cancel" onclick="closeModal()">취소</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DEFAULT_EX = {
  push:[
    {name:'인클라인 바벨 벤치프레스',sets:4,reps:'8-10',muscles:['윗가슴','전면삼각근'],tip:'등받이 30~45도. 가슴 위쪽을 의식하며 내릴 때 3초 천천히.'},
    {name:'플랫 덤벨 벤치프레스',sets:3,reps:'10-12',muscles:['중간가슴','삼두'],tip:'덤벨을 가슴 옆으로 내려 가슴 전체를 늘린 뒤 밀어올리기.'},
    {name:'케이블 크로스오버 (하향)',sets:3,reps:'12-15',muscles:['아랫가슴'],tip:'케이블을 위에서 아래·안쪽으로 당기기. 아랫가슴 집중.'},
    {name:'덤벨 숄더프레스',sets:3,reps:'10-12',muscles:['전면삼각근','측면삼각근'],tip:'팔꿈치 90도에서 시작. 위에서 완전히 펴기.'},
    {name:'사이드 레터럴 레이즈',sets:3,reps:'12-15',muscles:['측면삼각근'],tip:'팔을 옆으로만 어깨 높이까지. 반동 금지.'},
    {name:'리어 델트 플라이',sets:3,reps:'12-15',muscles:['후면삼각근'],tip:'상체 45도 숙이고 팔을 뒤·옆으로 벌리기.'},
    {name:'케이블 트라이셉스 푸시다운',sets:3,reps:'12-15',muscles:['삼두 외측두'],tip:'팔꿈치 고정, 손목 쭉 펴기. 위아래만 움직이기.'},
    {name:'오버헤드 덤벨 익스텐션',sets:3,reps:'10-12',muscles:['삼두 장두'],tip:'팔꿈치를 귀 옆에 고정. 머리 뒤로 천천히 내렸다 올리기.'},
  ],
  pull:[
    {name:'랫 풀다운',sets:4,reps:'8-10',muscles:['광배근','이두 단두'],tip:'가슴 앞으로 당기기. 등 뒤로 젖히지 않기.'},

function fmtDate(s){const d=new Date(s);return`${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]})`}

function getProgress(){
  const exs=exercises[dc()];let total=0,done=0;
  exs.forEach((ex,i)=>{for(let s=0;s<ex.sets;s++){total++;if(setsDone[`${activeDay}-${i}-${s}`])done++;}});
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function renderProgress(){
  const{total,done,pct}=getProgress();const c=dc();
  document.getElementById('progLbl').textContent=`${done} / ${total} 세트 완료`;
  document.getElementById('progPct').textContent=pct+'%';
  const f=document.getElementById('progFill');f.style.width=pct+'%';f.className=`prog-fill ${c}`;
  document.getElementById('routineSubtitle').textContent=DAYS[activeDay].sub+' 운동';
}
function isStampedToday(){return stamps.some(s=>s.date===todayStr()&&s.day===dc())}
function renderCmpBanner(){
  const{total,done}=getProgress();const all=total>0&&done===total;const stamped=isStampedToday();
  document.getElementById('cmpBanner').innerHTML=!all?'':
    `<div class="cmp-banner"><p>오늘 운동 완료! 🎉</p><span>${DAYS[activeDay].label} ${done}세트 모두 완료</span><br>
    <button class="stamp-btn${stamped?' stamped':''}" onclick="stampToday()">${stamped?'오늘 도장 찍힘 ✓':'도장 찍기 🔥'}</button></div>`;
}
function stampToday(){
  if(isStampedToday()){showToast('오늘은 이미 도장을 찍었어요!');return;}
  const today=todayStr();stamps.push({date:today,day:dc()});save('wstamps_v1',stamps);
  const{done}=getProgress();
  history.unshift({date:today,day:dc(),label:DAYS[activeDay].label,sub:DAYS[activeDay].sub,sets:done});
  save('whist_v1',history);renderCmpBanner();
  const str=calcStreak();showToast('🔥 도장 완료! '+str.current+'일 연속!',2500);
  setTimeout(()=>showToast(getStreakMsg(str.current),4000),2800);
}
function calcStreak(){
  if(!stamps.length)return{current:0,best:0,total:0,pushCount:0,pullCount:0,legsCount:0};
  const dates=[...new Set(stamps.map(s=>s.date))].sort().reverse();
  const today=todayStr();let cur=0,best=0;let prev=today;
  for(const d of dates){
    const diff=Math.round((new Date(prev)-new Date(d))/86400000);
    if(diff<=1){cur++;best=Math.max(best,cur);}else break;
    prev=d;
  }
  if(!stamps.some(s=>s.date===today))cur=0;
  return{current:cur,best:Math.max(best,cur),total:stamps.length,
    pushCount:stamps.filter(s=>s.day==='push').length,
    pullCount:stamps.filter(s=>s.day==='pull').length,
    legsCount:stamps.filter(s=>s.day==='legs').length};
}
function getStreakMsg(n){return([...STREAK_MSGS].reverse().find(m=>n>=m.min)||STREAK_MSGS[0]).msg}

        <button class="rec-add" onclick="openAddModal('${r.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">추가</button>
      </div></div>`).join('')+`</div>`).join('')
    ||`<div class="empty-hist">해당하는 운동이 없어요</div>`;
}
function setDiffF(v){diffF=v;renderRecommend()}
function setMuscleF(v){muscleF=v;renderRecommend()}

function openAddModal(name){
  pendingRec=name;
  document.getElementById('modalTitle').textContent=`"${name}" 추가할 날은?`;
  document.getElementById('modalBtns').innerHTML=DAYS.map((d,i)=>`
    <button class="modal-day-btn" onclick="addRecToDay(${i})">${d.label} · ${d.sub}</button>`).join('');
  document.getElementById('addModal').classList.remove('hidden');
}
function closeModal(){document.getElementById('addModal').classList.add('hidden');pendingRec=null}
function addRecToDay(dayIdx){
  if(!pendingRec)return;
  const rec=REC_DB.find(r=>r.name===pendingRec);
  const dayId=DAYS[dayIdx].id;
  exercises[dayId].push({name:rec.name,sets:3,reps:'10-12',muscles:rec.targets,tip:rec.desc});
  save('wex_v2',exercises);closeModal();
  showToast(`${rec.name} → ${DAYS[dayIdx].label} 추가 완료!`);
  if(activeDay===dayIdx)renderAll();
}

function renderStamp(){
  const str=calcStreak();
  document.getElementById('streakCard').innerHTML=`
    <div class="streak-fire">${str.current>=6?'🔥':str.current>=3?'💪':'🌱'}</div>
    <div class="streak-num">${str.current}</div>
    <div class="streak-lbl">일 연속</div>
    <div class="streak-msg">${getStreakMsg(str.current)}</div>
    <div class="best-row">
      <div class="best-item"><div class="best-val">${str.best}</div><div class="best-lbl">최고 연속</div></div>
      <div class="best-item"><div class="best-val">${str.total}</div><div class="best-lbl">총 운동일</div></div>
      <div class="best-item"><div class="best-val">${stamps.filter(s=>{const d=new Date(s.date),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()}).length}</div><div class="best-lbl">이번달</div></div>
    </div>`;
  const now=new Date();const year=now.getFullYear();const month=now.getMonth();
  const first=new Date(year,month,1);const last=new Date(year,month+1,0);
  document.getElementById('calTitle').textContent=`${year}년 ${month+1}월`;
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first.getDay();i++)html+=`<div class="cal-day faded"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st=stamps.find(s=>s.date===ds);const isToday=ds===todayStr();
    html+=`<div class="cal-day${st?' stamp '+st.day+'-day':isToday?' today':''}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  document.getElementById('achList').innerHTML=ACHIEVEMENTS.map(a=>`
    <div class="ach-item${a.req(str)?' unlocked':''}">
      <div class="ach-icon">${a.icon}</div>
      <div><div class="ach-name">${a.name}</div><div class="ach-cond">${a.cond}</div></div>
    </div>`).join('');
}

renderAll();
</script>
</body>
</html>
